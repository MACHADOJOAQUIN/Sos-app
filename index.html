<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOS App Web</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,500;0,700;0,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #111111;
            --surface-color: #151515;
            --input-bg: #1A1A1A;
            --border-color: #2A2A2A;
            --primary-red: #DC2626;
            --text-main: #FFFFFF;
            --text-muted: #888888;
            --state-pend: #DC2626;
            --state-prog: #3B82F6;
            --state-done: #10B981;
            --badge-yellow: #F59E0B;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: #000; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        input, textarea { user-select: auto; }

        /* Contenedor Principal */
        #app-container {
            width: 100%; max-width: 480px; height: 100%; background-color: var(--bg-color);
            display: flex; flex-direction: column; position: relative; overflow: hidden;
        }

        /* HEADER */
        header { padding: 20px 16px 10px; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: var(--primary-red); font-size: 32px; font-weight: 900; letter-spacing: 2px; }
        .header-actions { display: flex; align-items: center; gap: 16px; }
        .header-actions > i { color: var(--text-main); font-size: 20px; cursor: pointer; }
        
        /* Selector de Mes Personalizado */
        .month-selector {
            display: flex; align-items: center; background: var(--input-bg);
            border: 1px solid var(--border-color); border-radius: 20px; padding: 4px 8px; gap: 4px;
        }
        .month-selector button {
            background: transparent; border: none; color: var(--text-muted); cursor: pointer;
            padding: 6px 8px; font-size: 13px; transition: color 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .month-selector button:active { color: white; }
        .month-selector span {
            color: var(--text-main); font-size: 13px; font-weight: bold; min-width: 90px;
            text-align: center; cursor: pointer; text-transform: capitalize; padding: 0 4px;
        }

        /* BARRAS DE ORDEN Y FILTRO */
        .scroll-bar { display: flex; overflow-x: auto; padding: 10px 16px; gap: 10px; scrollbar-width: none; }
        .scroll-bar::-webkit-scrollbar { display: none; }
        
        .chip {
            padding: 8px 14px; border-radius: 12px; font-size: 12px; font-weight: bold; cursor: pointer;
            white-space: nowrap; border: 1px solid var(--border-color); color: var(--text-muted); background: var(--input-bg);
            display: flex; align-items: center; gap: 8px; transition: all 0.2s;
        }
        .chip-sort.active { background: var(--text-main); color: #000; border-color: var(--text-main); }
        .chip-filter.active { background: var(--primary-red); color: var(--text-main); border-color: var(--primary-red); }
        
        .badge-count { background: rgba(255,255,255,0.2); color: var(--text-main); padding: 2px 6px; border-radius: 10px; font-size: 11px; }

        /* LISTA PRINCIPAL */
        main { flex: 1; overflow-y: auto; padding: 10px 16px 20px; }
        
        .empty-state { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); text-align: center; }
        .empty-state i { font-size: 60px; margin-bottom: 16px; opacity: 0.5; }
        .empty-state h3 { color: var(--text-main); font-size: 20px; margin-bottom: 8px; }

        .card { background: var(--surface-color); border-radius: 16px; display: flex; margin-bottom: 12px; overflow: hidden; position: relative; }
        .card-border { width: 4px; background: var(--primary-red); flex-shrink: 0; }
        .card-content { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .card-id { color: var(--primary-red); font-size: 18px; font-weight: bold; }
        .card-date { color: var(--text-muted); font-size: 13px; margin-left: 8px; }
        .card-price { color: var(--text-main); font-size: 20px; font-weight: bold; }
        
        .card-info { display: flex; gap: 12px; color: var(--text-muted); font-size: 13px; font-weight: 500; align-items: center; }
        .card-info i { font-size: 14px; }
        .card-motivo { color: var(--text-muted); font-size: 13px; font-style: italic; }
        
        .card-footer { display: flex; justify-content: space-between; align-items: flex-end; }
        .badges-container { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
        .text-badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }
        
        .card-actions { display: flex; gap: 8px; }
        .btn-icon { background: #1E1E1E; border: 1px solid var(--border-color); border-radius: 8px; padding: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* FOOTER */
        footer { background: var(--surface-color); border-top: 1px solid var(--border-color); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .total-label { color: var(--text-muted); font-size: 10px; font-weight: bold; letter-spacing: 1px; margin-bottom: 2px; display: block; }
        .total-amount { color: var(--text-main); font-size: 26px; font-weight: bold; }
        .fab { background: var(--primary-red); width: 64px; height: 56px; border-radius: 16px; border: none; color: white; font-size: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3); }

        /* MODALES */
        .modal-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 100; display: flex; justify-content: center; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .bottom-sheet { background: var(--bg-color); width: 100%; height: 95%; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.1, 0.8, 0.3, 1); }
        .modal-overlay.active .bottom-sheet { transform: translateY(0); }
        
        .sheet-header { display: flex; align-items: center; padding: 16px; }
        .btn-close { background: var(--input-bg); border: none; color: white; width: 40px; height: 40px; border-radius: 10px; font-size: 18px; cursor: pointer; }
        .sheet-title { flex: 1; text-align: center; color: white; font-size: 18px; font-weight: bold; margin-right: 40px; }
        
        .sheet-body { flex: 1; overflow-y: auto; padding: 16px; }
        
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; color: var(--text-muted); font-size: 12px; font-weight: bold; letter-spacing: 1px; margin-bottom: 8px; }
        .input-group input { width: 100%; background: var(--input-bg); border: 1px solid var(--border-color); color: white; font-size: 16px; padding: 16px; border-radius: 12px; outline: none; }
        .input-group input:focus { border-color: var(--primary-red); }
        
        .row { display: flex; gap: 16px; }
        .row .input-group { flex: 1; }

        .estado-selector { display: flex; gap: 8px; margin-bottom: 24px; }
        .estado-btn { flex: 1; padding: 12px 0; background: var(--input-bg); border-radius: 12px; color: var(--text-muted); text-align: center; font-weight: bold; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .estado-btn.active { background: white; color: black; }

        .toggle-row { display: flex; justify-content: space-between; align-items: center; background: var(--input-bg); border: 1px solid var(--border-color); padding: 12px 16px; border-radius: 12px; margin-bottom: 16px; }
        .toggle-label { color: white; font-size: 16px; }
        .toggle-btn { padding: 6px 16px; border-radius: 6px; font-weight: bold; color: white; cursor: pointer; font-size: 14px; transition: 0.2s;}
        .toggle-btn.yes { background: var(--state-done); }
        .toggle-btn.no { background: var(--primary-red); }

        .btn-save { width: 100%; background: var(--border-color); color: var(--text-muted); border: none; padding: 18px; border-radius: 16px; font-size: 15px; font-weight: bold; letter-spacing: 1px; margin-top: 16px; cursor: pointer; transition: 0.2s; }
        .btn-save.valid { background: var(--primary-red); color: white; }

        /* Modal Borrar */
        .dialog { background: #1E1E1E; width: 90%; max-width: 320px; border-radius: 20px; padding: 24px; transform: scale(0.9); transition: transform 0.3s; margin-bottom: auto; margin-top: auto; }
        .modal-overlay.active .dialog { transform: scale(1); }
        .dialog h3 { color: white; margin-bottom: 12px; font-size: 18px; }
        .dialog p { color: var(--text-muted); font-size: 14px; line-height: 1.4; margin-bottom: 24px; }
        .dialog-actions { display: flex; gap: 12px; justify-content: flex-end; }
        .dialog-actions button { padding: 12px 20px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-cancel { background: #2A2A2A; color: white; }
        .btn-confirm-delete { background: var(--primary-red); color: white; }
    </style>
</head>

<body>
<div id="app-container">
    <header>
        <div class="logo">SOS</div>
        <div class="header-actions">
            <div class="month-selector">
                <button onclick="toggleAllMonths()" id="btn-toggle-all" title="Ver todo el historial"><i class="fa-solid fa-list-ul"></i></button>
                
                <button onclick="changeMonth(-1)" class="month-nav"><i class="fa-solid fa-chevron-left"></i></button>
                <span id="current-month-display" onclick="resetToCurrentMonth()">Abril 2026</span>
                <button onclick="changeMonth(1)" class="month-nav"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
            <i class="fa-solid fa-download" onclick="alert('Función de exportar en desarrollo')"></i>
        </div>
    </header>

    <div class="scroll-bar" id="sort-container">
        <div class="chip chip-sort active" data-sort="FECHA">FECHA ↓</div>
        <div class="chip chip-sort" data-sort="MONTO">MONTO</div>
        <div class="chip chip-sort" data-sort="SERVICIO">SERVICIO</div>
    </div>

    <div class="scroll-bar" id="filter-container">
        <div class="chip chip-filter active" data-filter="Todos">Todos <span class="badge-count" id="c-todos">0</span></div>
        <div class="chip chip-filter" data-filter="Pendiente">Pendiente <span class="badge-count" id="c-pend">0</span></div>
        <div class="chip chip-filter" data-filter="En Curso">En Curso <span class="badge-count" id="c-curso">0</span></div>
        <div class="chip chip-filter" data-filter="Terminado">Terminado <span class="badge-count" id="c-term">0</span></div>
    </div>

    <main id="list-container">
        </main>

    <footer>
        <div>
            <span class="total-label" id="total-label-text">TOTAL DEL MES</span>
            <div class="total-amount" id="total-monto">$0,00</div>
        </div>
        <button class="fab" onclick="openForm()"><i class="fa-solid fa-plus"></i></button>
    </footer>

    <div class="modal-overlay" id="modal-form">
        <div class="bottom-sheet">
            <div class="sheet-header">
                <button class="btn-close" onclick="closeForm()"><i class="fa-solid fa-xmark"></i></button>
                <div class="sheet-title">Nuevo Registro</div>
            </div>
            <div class="sheet-body">
                <input type="hidden" id="f-id">
                
                <div class="input-group">
                    <label>FECHA (AAAA-MM-DD)</label>
                    <input type="date" id="f-fecha">
                </div>
                
                <div class="row">
                    <div class="input-group">
                        <label>SERVICIO N</label>
                        <input type="number" id="f-servicio" placeholder="Ej: 138686">
                    </div>
                    <div class="input-group">
                        <label>MONTO ($)</label>
                        <input type="number" step="0.01" id="f-monto" placeholder="0.00">
                    </div>
                </div>

                <div class="input-group">
                    <label>VEHICULO</label>
                    <input type="text" id="f-vehiculo" placeholder="Ej: Hilux">
                </div>
                <div class="input-group">
                    <label>PATENTE</label>
                    <input type="text" id="f-patente" placeholder="ABC123">
                </div>
                <div class="input-group">
                    <label>KM</label>
                    <input type="number" id="f-km" placeholder="0">
                </div>
                <div class="input-group">
                    <label>MOTIVO</label>
                    <input type="text" id="f-motivo" placeholder="Mantenimiento">
                </div>

                <label style="color: var(--text-muted); font-size: 12px; font-weight: bold; letter-spacing: 1px; display:block; margin-bottom: 8px;">ESTADO</label>
                <div class="estado-selector">
                    <div class="estado-btn active" onclick="setEstado('Pendiente')" id="btn-est-pend">Pendiente</div>
                    <div class="estado-btn" onclick="setEstado('En Curso')" id="btn-est-curso">En Curso</div>
                    <div class="estado-btn" onclick="setEstado('Terminado')" id="btn-est-term">Terminado</div>
                </div>

                <div class="toggle-row">
                    <span class="toggle-label">Consiliado</span>
                    <div class="toggle-btn no" id="btn-consiliado" onclick="toggleBoolean('consiliado')">NO</div>
                </div>
                <div class="toggle-row">
                    <span class="toggle-label">Cobrado</span>
                    <div class="toggle-btn no" id="btn-cobrado" onclick="toggleBoolean('cobrado')">NO</div>
                </div>

                <button class="btn-save valid" onclick="saveRecord()">✓ GUARDAR REGISTRO</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-delete">
        <div class="dialog">
            <h3>Borrar registro</h3>
            <p id="delete-text">Servicio #123 de ABC. Esta accion no se puede deshacer.</p>
            <div class="dialog-actions">
                <button class="btn-cancel" onclick="closeDelete()">CANCELAR</button>
                <button class="btn-confirm-delete" onclick="confirmDelete()">BORRAR</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- ESTADO DE LA APLICACIÓN ---
    let records = JSON.parse(localStorage.getItem('sos_records')) || [];
    let currentFilter = 'Todos';
    let sortBy = 'FECHA';
    let sortAscending = false;
    let showAllMonths = false; // Nueva variable para controlar si mostramos todo
    
    // Función segura para obtener la fecha de hoy YYYY-MM-DD
    const getTodayYMD = () => {
        const d = new Date();
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    };

    // Filtro de mes arranca en el mes actual ("YYYY-MM")
    let currentMonthFilter = getTodayYMD().substring(0, 7); 

    // Variables Temporales de Formulario
    let formEstado = 'Pendiente';
    let formConsiliado = false;
    let formCobrado = false;
    let recordToDeleteId = null;

    // --- FORMATEADORES ---
    const formatCurrency = (amount) => {
        return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' }).format(amount);
    };

    const formatDateStr = (dateString) => {
        if(!dateString) return '';
        const parts = dateString.split('-');
        if(parts.length !== 3) return dateString;
        return `${parts[2]}/${parts[1]}/${parts[0]}`;
    };

    const getMonthName = (periodoMes) => {
        if (!periodoMes) return '';
        const parts = periodoMes.split('-');
        if (parts.length !== 2) return periodoMes;
        const year = parts[0];
        const monthIndex = parseInt(parts[1], 10) - 1;
        const months = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
        return `${months[monthIndex]} ${year}`;
    };

    const generateId = () => '_' + Math.random().toString(36).substr(2, 9);

    // --- RENDERIZADO PRINCIPAL ---
    const renderApp = () => {
        const btnToggleAll = document.getElementById('btn-toggle-all');
        const monthNavs = document.querySelectorAll('.month-nav');
        const monthDisplay = document.getElementById('current-month-display');
        const totalLabel = document.getElementById('total-label-text');

        // Adaptar la interfaz dependiendo si mostramos todo o un solo mes
        if (showAllMonths) {
            monthDisplay.innerText = "Historial Completo";
            monthNavs.forEach(el => el.style.display = 'none');
            btnToggleAll.style.color = "var(--primary-red)";
            totalLabel.innerText = "TOTAL ACUMULADO";
        } else {
            monthDisplay.innerText = getMonthName(currentMonthFilter);
            monthNavs.forEach(el => el.style.display = 'flex');
            btnToggleAll.style.color = "var(--text-muted)";
            totalLabel.innerText = "TOTAL DEL MES";
        }

        // 1. Filtrar por MES o Traer Todo
        let recordsTarget = showAllMonths 
            ? records 
            : records.filter(r => r.fecha.startsWith(currentMonthFilter));

        // 2. Filtrar por ESTADO (sobre los registros seleccionados)
        let filtered = recordsTarget;
        if (currentFilter !== 'Todos') {
            filtered = recordsTarget.filter(r => r.estado === currentFilter);
        }

        // 3. Ordenar
        filtered.sort((a, b) => {
            let res = 0;
            if (sortBy === 'FECHA') {
                res = a.fecha.localeCompare(b.fecha);
            } else if (sortBy === 'MONTO') {
                res = parseFloat(a.monto) - parseFloat(b.monto);
            } else {
                res = parseInt(a.servicio) - parseInt(b.servicio);
            }
            return sortAscending ? res : -res;
        });

        // Actualizar UI
        updateCounters(recordsTarget);
        updateSortChips();
        renderList(filtered);
        
        // Actualizar Total (Suma de los filtrados actualmente en pantalla)
        const total = filtered.reduce((sum, r) => sum + parseFloat(r.monto || 0), 0);
        document.getElementById('total-monto').innerText = formatCurrency(total);
        
        // Guardar en Storage
        localStorage.setItem('sos_records', JSON.stringify(records));
    };

    const updateCounters = (baseRecords) => {
        document.getElementById('c-todos').innerText = baseRecords.length;
        document.getElementById('c-pend').innerText = baseRecords.filter(r => r.estado === 'Pendiente').length;
        document.getElementById('c-curso').innerText = baseRecords.filter(r => r.estado === 'En Curso').length;
        document.getElementById('c-term').innerText = baseRecords.filter(r => r.estado === 'Terminado').length;

        document.querySelectorAll('.chip-filter').forEach(chip => {
            if(chip.dataset.filter === currentFilter) chip.classList.add('active');
            else chip.classList.remove('active');
        });
    };

    const updateSortChips = () => {
        document.querySelectorAll('.chip-sort').forEach(chip => {
            if(chip.dataset.sort === sortBy) {
                chip.classList.add('active');
                chip.innerText = `${sortBy} ${sortAscending ? '↑' : '↓'}`;
            } else {
                chip.classList.remove('active');
                chip.innerText = chip.dataset.sort;
            }
        });
    };

    const renderList = (filteredRecords) => {
        const container = document.getElementById('list-container');
        
        if (filteredRecords.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fa-solid fa-inbox"></i>
                    <h3>Sin registros</h3>
                    <p>${showAllMonths ? 'No hay ningún servicio registrado.' : 'No hay servicios en este mes.'}</p>
                </div>
            `;
            return;
        }

        container.innerHTML = '';
        filteredRecords.forEach(r => {
            let borderColor = 'var(--state-pend)';
            if(r.estado === 'En Curso') borderColor = 'var(--state-prog)';
            if(r.estado === 'Terminado') borderColor = 'var(--state-done)';

            const badgeEstado = `<div class="text-badge" style="background: rgba(245,158,11,0.1); color: var(--badge-yellow);">${r.estado.toUpperCase()}</div>`;
            const consColor = r.consiliado ? 'var(--state-done)' : 'var(--state-pend)';
            const badgeCons = `<div class="text-badge" style="background: ${r.consiliado ? 'rgba(16,185,129,0.1)' : 'rgba(220,38,38,0.1)'}; color: ${consColor};">${r.consiliado ? 'CONSIL.' : 'NO CONSIL.'}</div>`;
            const cobColor = r.cobrado ? 'var(--state-done)' : 'var(--state-pend)';
            const badgeCob = `<div class="text-badge" style="background: ${r.cobrado ? 'rgba(16,185,129,0.1)' : 'rgba(220,38,38,0.1)'}; color: ${cobColor};">${r.cobrado ? 'COBRADO' : 'NO COBRADO'}</div>`;

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-border" style="background-color: ${borderColor}"></div>
                <div class="card-content">
                    <div class="card-header">
                        <div style="display:flex; align-items:center;">
                            <span class="card-id">#${r.servicio}</span>
                            <span class="card-date">${formatDateStr(r.fecha)}</span>
                        </div>
                        <span class="card-price">${formatCurrency(r.monto)}</span>
                    </div>
                    
                    <div class="card-info">
                        <i class="fa-solid fa-truck"></i> <span>${r.vehiculo || 'S/V'}</span>
                        <i class="fa-solid fa-hashtag" style="margin-left:8px;"></i> <span>${r.patente ? r.patente.toUpperCase() : 'S/P'}</span>
                        <i class="fa-solid fa-location-arrow" style="margin-left:8px;"></i> <span>${r.km || 0} km</span>
                    </div>
                    
                    ${r.motivo ? `<div class="card-motivo">${r.motivo}</div>` : ''}
                    
                    <div class="card-footer">
                        <div class="badges-container">
                            ${badgeEstado}
                            ${badgeCons}
                            ${badgeCob}
                        </div>
                        <div class="card-actions">
                            <div class="btn-icon" style="color: var(--badge-yellow);" onclick="openForm('${r.id}')"><i class="fa-solid fa-pen"></i></div>
                            <div class="btn-icon" style="color: var(--primary-red);" onclick="openDelete('${r.id}')"><i class="fa-regular fa-trash-can"></i></div>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    };

    // --- EVENTOS DE NAVEGACIÓN Y TOGGLE ---
    const toggleAllMonths = () => {
        showAllMonths = !showAllMonths;
        renderApp();
    };

    const changeMonth = (delta) => {
        if (showAllMonths) return; // Si está en "Todos", no hace nada
        let [year, month] = currentMonthFilter.split('-').map(Number);
        month += delta;
        
        if (month === 0) { month = 12; year--; }
        else if (month === 13) { month = 1; year++; }
        
        currentMonthFilter = `${year}-${String(month).padStart(2, '0')}`;
        renderApp();
    };

    const resetToCurrentMonth = () => {
        if (showAllMonths) return;
        currentMonthFilter = getTodayYMD().substring(0, 7);
        renderApp();
    };

    // --- EVENTOS DE FILTROS ---
    document.querySelectorAll('.chip-filter').forEach(chip => {
        chip.addEventListener('click', (e) => {
            currentFilter = e.currentTarget.dataset.filter;
            renderApp();
        });
    });

    document.querySelectorAll('.chip-sort').forEach(chip => {
        chip.addEventListener('click', (e) => {
            const clickedSort = e.currentTarget.dataset.sort;
            if (sortBy === clickedSort) {
                sortAscending = !sortAscending;
            } else {
                sortBy = clickedSort;
                sortAscending = clickedSort !== 'FECHA';
            }
            renderApp();
        });
    });

    // --- LÓGICA DE FORMULARIO ---
    const openForm = (id = null) => {
        document.querySelector('.sheet-title').innerText = id ? 'Editar Registro' : 'Nuevo Registro';
        
        if (id) {
            const r = records.find(x => x.id === id);
            document.getElementById('f-id').value = r.id;
            document.getElementById('f-fecha').value = r.fecha;
            document.getElementById('f-servicio').value = r.servicio;
            document.getElementById('f-monto').value = r.monto;
            document.getElementById('f-vehiculo').value = r.vehiculo;
            document.getElementById('f-patente').value = r.patente;
            document.getElementById('f-km').value = r.km;
            document.getElementById('f-motivo').value = r.motivo;
            setEstado(r.estado);
            formConsiliado = r.consiliado;
            formCobrado = r.cobrado;
        } else {
            document.getElementById('f-id').value = '';
            document.getElementById('f-fecha').value = getTodayYMD();
            document.getElementById('f-servicio').value = '';
            document.getElementById('f-monto').value = '';
            document.getElementById('f-vehiculo').value = '';
            document.getElementById('f-patente').value = '';
            document.getElementById('f-km').value = '';
            document.getElementById('f-motivo').value = '';
            setEstado('Pendiente');
            formConsiliado = false;
            formCobrado = false;
        }
        
        updateToggleUI('consiliado', formConsiliado);
        updateToggleUI('cobrado', formCobrado);
        document.getElementById('modal-form').classList.add('active');
    };

    const closeForm = () => document.getElementById('modal-form').classList.remove('active');

    const setEstado = (est) => {
        formEstado = est;
        ['pend', 'curso', 'term'].forEach(e => document.getElementById(`btn-est-${e}`).classList.remove('active'));
        if(est === 'Pendiente') document.getElementById('btn-est-pend').classList.add('active');
        if(est === 'En Curso') document.getElementById('btn-est-curso').classList.add('active');
        if(est === 'Terminado') document.getElementById('btn-est-term').classList.add('active');
    };

    const toggleBoolean = (type) => {
        if(type === 'consiliado') formConsiliado = !formConsiliado;
        else formCobrado = !formCobrado;
        updateToggleUI(type, type === 'consiliado' ? formConsiliado : formCobrado);
    };

    const updateToggleUI = (type, val) => {
        const btn = document.getElementById(`btn-${type}`);
        if(val) {
            btn.classList.replace('no', 'yes');
            btn.innerText = 'SI';
        } else {
            btn.classList.replace('yes', 'no');
            btn.innerText = 'NO';
        }
    };

    const saveRecord = () => {
        const id = document.getElementById('f-id').value;
        const newRecord = {
            id: id || generateId(),
            fecha: document.getElementById('f-fecha').value || getTodayYMD(),
            servicio: document.getElementById('f-servicio').value || '0',
            monto: document.getElementById('f-monto').value || '0',
            vehiculo: document.getElementById('f-vehiculo').value,
            patente: document.getElementById('f-patente').value.toUpperCase(),
            km: document.getElementById('f-km').value || '0',
            motivo: document.getElementById('f-motivo').value,
            estado: formEstado,
            consiliado: formConsiliado,
            cobrado: formCobrado
        };

        if (id) {
            const index = records.findIndex(r => r.id === id);
            if (index !== -1) records[index] = newRecord;
        } else {
            records.push(newRecord);
            // Si agrega un registro nuevo y no está viendo "Todos", lo llevamos al mes de ese registro
            if (!showAllMonths) {
                currentMonthFilter = newRecord.fecha.substring(0, 7);
            }
        }

        closeForm();
        renderApp();
    };

    // --- LÓGICA DE BORRADO ---
    const openDelete = (id) => {
        recordToDeleteId = id;
        const r = records.find(x => x.id === id);
        document.getElementById('delete-text').innerText = `Servicio #${r.servicio} de ${r.patente ? r.patente.toUpperCase() : 'este vehículo'}. Esta accion no se puede deshacer.`;
        document.getElementById('modal-delete').classList.add('active');
    };

    const closeDelete = () => {
        recordToDeleteId = null;
        document.getElementById('modal-delete').classList.remove('active');
    };

    const confirmDelete = () => {
        if (recordToDeleteId) {
            records = records.filter(r => r.id !== recordToDeleteId);
            closeDelete();
            renderApp();
        }
    };

    // INICIAR APP
    renderApp();
</script>
</body>
</html>
