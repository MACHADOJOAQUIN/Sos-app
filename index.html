<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOS App Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
 <style>
    :root {
        --bg-color: #000000;
        --surface-color: #121212;
        --input-bg: #1a1a1a;
        --border-color: #262626;
        --primary-red: #DC2626;
        --text-main: #FFFFFF;
        --text-muted: #737373;
        --state-pend: #DC2626;
        --state-prog: #2563EB;
        --state-done: #10B981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
    body { background-color: #000; display: flex; justify-content: center; height: 100vh; overflow: hidden; color: var(--text-main); }

    #app-container { width: 100%; max-width: 480px; height: 100%; background-color: var(--bg-color); display: flex; flex-direction: column; position: relative; }

    /* HEADER */
    header { padding: 25px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
    .logo { color: var(--primary-red); font-size: 34px; font-weight: 900; letter-spacing: 2px; }
    
    #auth-btn { background: var(--input-bg); border: 1px solid var(--border-color); color: white; padding: 10px 14px; border-radius: 14px; font-size: 11px; font-weight: 900; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    #auth-btn.logged-in { border-color: var(--state-done); color: var(--state-done); }

    /* SELECTOR MES */
    .month-selector { display: flex; align-items: center; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 5px 10px; gap: 5px; }
    .month-selector button { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 6px; font-size: 14px; }
    .month-selector span { color: var(--text-main); font-size: 13px; font-weight: 900; min-width: 90px; text-align: center; text-transform: uppercase; }
    #btn-toggle-all.active { color: var(--primary-red); }

    /* FILTROS Y CHIPS */
    .scroll-bar { display: flex; overflow-x: auto; padding: 10px 20px; gap: 10px; scrollbar-width: none; }
    .scroll-bar::-webkit-scrollbar { display: none; }
    .chip { padding: 10px 18px; border-radius: 14px; font-size: 12px; font-weight: bold; cursor: pointer; border: 1px solid var(--border-color); color: var(--text-muted); background: var(--surface-color); white-space: nowrap; display: flex; align-items: center; gap: 8px; }
    .chip.active { background: var(--primary-red); color: white; border-color: var(--primary-red); }
    .chip-sort.active { background: white; color: black; border-color: white; }
    .badge { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 8px; font-size: 10px; }

    /* LISTA Y TARJETAS */
    main { flex: 1; overflow-y: auto; padding: 10px 20px 120px; }
    .card { background: var(--surface-color); border-radius: 20px; display: flex; margin-bottom: 15px; border: 1px solid var(--border-color); overflow: hidden; }
    .card-border { width: 6px; }
    .card-content { padding: 18px; flex: 1; display: flex; flex-direction: column; gap: 12px; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .card-id { color: var(--primary-red); font-size: 18px; font-weight: 900; }
    .card-price { font-size: 22px; font-weight: 900; letter-spacing: -1px; }
    .card-info { display: flex; gap: 12px; color: var(--text-muted); font-size: 13px; font-weight: 500; }
    .card-motivo { font-size: 12px; color: #555; font-style: italic; }

    /* FOOTER */
    footer { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); border-top: 1px solid var(--border-color); padding: 20px 25px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
    #total-label { color: var(--text-muted); font-size: 11px; font-weight: 900; letter-spacing: 1px; display: block; margin-bottom: 4px; }
    .total-amount { font-size: 32px; font-weight: 900; letter-spacing: -1px; }
    .fab { background: var(--primary-red); width: 65px; height: 58px; border-radius: 18px; border: none; color: white; font-size: 26px; cursor: pointer; box-shadow: 0 10px 25px rgba(220, 38, 38, 0.4); display: flex; align-items: center; justify-content: center; }

    /* MODAL */
    .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; justify-content: center; align-items: flex-end; opacity: 0; pointer-events: none; transition: 0.3s; }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .bottom-sheet { background: var(--bg-color); width: 100%; height: 92%; border-radius: 30px 30px 0 0; transform: translateY(100%); transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); padding: 30px; overflow-y: auto; }
    .modal-overlay.active .bottom-sheet { transform: translateY(0); }
    .btn-close { background: var(--input-bg); border: none; color: white; padding: 12px; border-radius: 15px; cursor: pointer; }
    .sheet-title { flex: 1; text-align: center; font-size: 18px; font-weight: 900; margin-right: 40px; }
    .sheet-header { display: flex; align-items: center; margin-bottom: 30px; }
    
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; color: var(--text-muted); font-size: 11px; font-weight: 900; margin-bottom: 8px; letter-spacing: 1px; }
    .input-group input, .input-group select { width: 100%; background: var(--input-bg); border: 1px solid var(--border-color); color: white; padding: 16px; border-radius: 14px; outline: none; font-size: 16px; font-weight: 500; }
    .btn-save { width: 100%; background: var(--primary-red); color: white; border: none; padding: 20px; border-radius: 18px; font-size: 16px; font-weight: 900; margin-top: 20px; cursor: pointer; }
    .btn-delete { width: 100%; background: transparent; color: #444; border: none; padding: 15px; margin-top: 10px; font-weight: bold; cursor: pointer; }

    #loading-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
           </style>
 
</head>
<body>

<div id="loading-overlay">
    <i class="fa-solid fa-circle-notch fa-spin fa-3x" style="color: var(--primary-red); margin-bottom: 15px;"></i>
    <p>Sincronizando con Drive...</p>
</div>

<div id="app-container">
    <header>
        <div class="logo">SOS</div>
        <div class="header-actions">
            <button id="auth-btn" onclick="handleAuthClick()">
                <i class="fa-brands fa-google"></i> <span id="auth-text">CONECTAR</span>
            </button>
            <div class="month-selector">
                <button onclick="toggleAllMonths()" id="btn-toggle-all"><i class="fa-solid fa-list-ul"></i></button>
                <button onclick="changeMonth(-1)" class="month-nav"><i class="fa-solid fa-chevron-left"></i></button>
                <span id="current-month-display">---</span>
                <button onclick="changeMonth(1)" class="month-nav"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </header>

    <div class="scroll-bar">
        <div class="chip chip-sort active" id="sort-date" onclick="setSort('FECHA')">FECHA ↓</div>
        <div class="chip chip-sort" id="sort-amount" onclick="setSort('MONTO')">MONTO</div>
        <div class="chip chip-sort" id="sort-service" onclick="setSort('SERVICIO')">SERVICIO</div>
    </div>

    <div class="scroll-bar">
        <div class="chip chip-filter active" id="f-all" onclick="setFilter('Todos')">Todos <span class="badge" id="c-todos">0</span></div>
        <div class="chip chip-filter" id="f-pend" onclick="setFilter('Pendiente')">Pendientes <span class="badge" id="c-pend">0</span></div>
        <div class="chip chip-filter" id="f-done" onclick="setFilter('Terminado')">Terminados <span class="badge" id="c-done">0</span></div>
    </div>

    <main id="list-container"></main>

    <footer>
        <div>
            <span id="total-label">TOTAL DEL MES</span>
            <div class="total-amount" id="total-monto">$0,00</div>
        </div>
        <button class="fab" onclick="openForm()"><i class="fa-solid fa-plus"></i></button>
    </footer>

    <div class="modal-overlay" id="modal-form">
        <div class="bottom-sheet">
            <div class="sheet-header">
                <button class="btn-close" onclick="closeForm()"><i class="fa-solid fa-xmark"></i></button>
                <div class="sheet-title">Registro de Servicio</div>
            </div>
            <div class="sheet-body">
                <input type="hidden" id="f-id">
                <div class="input-group"><label>FECHA</label><input type="date" id="f-fecha"></div>
                <div style="display:flex; gap:15px;">
                    <div class="input-group" style="flex:1;"><label>SERVICIO #</label><input type="number" id="f-servicio"></div>
                    <div class="input-group" style="flex:1;"><label>MONTO ($)</label><input type="number" step="0.01" id="f-monto"></div>
                </div>
                <div class="input-group"><label>PATENTE / VEHÍCULO</label><input type="text" id="f-patente"></div>
                <div class="input-group"><label>DETALLE / MOTIVO</label><input type="text" id="f-motivo"></div>
                <div class="input-group">
                    <label>ESTADO</label>
                    <select id="f-estado">
                        <option value="Pendiente">Pendiente</option>
                        <option value="En Curso">En Curso</option>
                        <option value="Terminado">Terminado</option>
                    </select>
                </div>
                <button class="btn-save" onclick="saveRecord()">✓ GUARDAR CAMBIOS</button>
                <button id="btn-del" class="btn-delete" onclick="deleteRecord()">BORRAR ESTE REGISTRO</button>
            </div>
        </div>
    </div>
</div>
<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

<script>
    // --- CONFIGURACIÓN DRIVE ---
    const API_KEY = 'AIzaSyCg2T_OVIV0C6Lmx-JCmV67nLiQDAwqbss';
    const CLIENT_ID = '474241917322-l7ub2cma675eat9g7ht2q8po09a15qhl.apps.googleusercontent.com'; // <--- PEGA TU CLIENT ID AQUÍ
    const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
    const SCOPES = 'https://www.googleapis.com/auth/drive.file';

    let tokenClient, gapiInited = false, gisInited = false, driveFileId = null;
    let records = [], currentFilter = 'Todos', sortBy = 'FECHA', sortAsc = false, showAll = false;
    let currentMonth = new Date().toISOString().substring(0, 7);

    function gapiLoaded() { gapi.load('client', async () => { await gapi.client.init({apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC]}); gapiInited = true; checkAuth(); }); }
    function gisLoaded() { tokenClient = google.accounts.oauth2.initTokenClient({client_id: CLIENT_ID, scope: SCOPES, callback: ''}); gisInited = true; }

    async function checkAuth() {
        const t = localStorage.getItem('g_token');
        if(t) { gapi.client.setToken({access_token: t}); updateUIAuth(true); sync(); } else { render(); }
    }

    function handleAuthClick() {
        tokenClient.callback = async (r) => { 
            if(r.error) return;
            localStorage.setItem('g_token', r.access_token); 
            updateUIAuth(true); 
            sync(); 
        };
        tokenClient.requestAccessToken({prompt: gapi.client.getToken() ? '' : 'consent'});
    }

    function updateUIAuth(s) { 
        const btn = document.getElementById('auth-btn');
        if(s) { btn.classList.add('logged-in'); document.getElementById('auth-text').innerText = 'EN LA NUBE'; } 
    }

    async function sync() {
        document.getElementById('loading-overlay').style.display = 'flex';
        try {
            const res = await gapi.client.drive.files.list({ q: "name = 'sos_final_db.json' and trashed = false" });
            const files = res.result.files;
            if(files.length > 0) {
                driveFileId = files[0].id;
                const content = await gapi.client.drive.files.get({ fileId: driveFileId, alt: 'media' });
                records = content.result || [];
            } else {
                const meta = { name: 'sos_final_db.json', mimeType: 'application/json' };
                const file = await gapi.client.drive.files.create({ resource: meta, fields: 'id' });
                driveFileId = file.result.id;
            }
            render();
        } catch(e) { console.error(e); }
        document.getElementById('loading-overlay').style.display = 'none';
    }

    async function saveToDrive() {
        if(!driveFileId || !gapi.client.getToken()) return;
        await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
            method: 'PATCH', 
            headers: { 'Authorization': `Bearer ${gapi.client.getToken().access_token}` }, 
            body: JSON.stringify(records)
        });
    }

    // --- LÓGICA DE RENDERIZADO ---
    function render() {
        const display = document.getElementById('current-month-display');
        const navs = document.querySelectorAll('.month-nav');
        const label = document.getElementById('total-label');
        const btnAll = document.getElementById('btn-toggle-all');
        
        if(showAll) { 
            display.innerText = "Historial"; 
            navs.forEach(n => n.style.display='none'); 
            label.innerText = "TOTAL ACUMULADO";
            btnAll.classList.add('active');
        } else { 
            display.innerText = currentMonth; 
            navs.forEach(n => n.style.display='block'); 
            label.innerText = "TOTAL DEL MES";
            btnAll.classList.remove('active');
        }

        let filtered = showAll ? records : records.filter(r => r.fecha.startsWith(currentMonth));
        updateCounters(filtered);

        if(currentFilter !== 'Todos') filtered = filtered.filter(r => r.estado === currentFilter);

        filtered.sort((a,b) => {
            let res = 0;
            if(sortBy === 'FECHA') res = a.fecha.localeCompare(b.fecha);
            else if(sortBy === 'MONTO') res = parseFloat(a.monto) - parseFloat(b.monto);
            else res = parseInt(a.servicio) - parseInt(b.servicio);
            return sortAsc ? res : -res;
        });

        const container = document.getElementById('list-container');
        container.innerHTML = filtered.length ? '' : '<p style="color:#333;text-align:center;margin-top:60px;font-weight:900;">SIN REGISTROS</p>';
        
        filtered.forEach(r => {
            const color = r.estado === 'Terminado' ? 'var(--state-done)' : (r.estado === 'En Curso' ? 'var(--state-prog)' : 'var(--state-pend)');
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div class="card-border" style="background:${color}"></div>
                <div class="card-content" onclick="openForm('${r.id}')">
                    <div class="card-header"><span class="card-id">#${r.servicio}</span><span class="card-price">$${parseFloat(r.monto).toLocaleString()}</span></div>
                    <div class="card-info"><i class="fa-solid fa-calendar"></i> ${r.fecha.split('-').reverse().join('/')} <i class="fa-solid fa-car"></i> ${r.patente}</div>
                    ${r.motivo ? `<div class="card-motivo">${r.motivo}</div>` : ''}
                </div>
            `;
            container.appendChild(div);
        });

        const total = filtered.reduce((s, r) => s + parseFloat(r.monto || 0), 0);
        document.getElementById('total-monto').innerText = '$' + total.toLocaleString('es-AR', {minimumFractionDigits: 2});
    }

    function updateCounters(base) {
        document.getElementById('c-todos').innerText = base.length;
        document.getElementById('c-pend').innerText = base.filter(x => x.estado === 'Pendiente').length;
        document.getElementById('c-done').innerText = base.filter(x => x.estado === 'Terminado').length;
    }

    function toggleAllMonths() { showAll = !showAll; render(); }
    function changeMonth(d) {
        let [y, m] = currentMonth.split('-').map(Number);
        m += d; if(m>12){m=1;y++} else if(m<1){m=12;y--}
        currentMonth = `${y}-${String(m).padStart(2,'0')}`; render();
    }
    function setFilter(f) { 
        currentFilter = f; 
        document.querySelectorAll('.chip-filter').forEach(c => c.classList.remove('active'));
        if(f==='Todos') document.getElementById('f-all').classList.add('active');
        if(f==='Pendiente') document.getElementById('f-pend').classList.add('active');
        if(f==='Terminado') document.getElementById('f-done').classList.add('active');
        render(); 
    }
    function setSort(s) { 
        if(sortBy === s) sortAsc = !sortAsc; else { sortBy = s; sortAsc = false; } 
        document.querySelectorAll('.chip-sort').forEach(c => c.classList.remove('active'));
        const btn = document.getElementById(`sort-${s.toLowerCase() === 'fecha' ? 'date' : (s.toLowerCase() === 'monto' ? 'amount' : 'service')}`);
        btn.classList.add('active');
        btn.innerText = s + (sortAsc ? ' ↑' : ' ↓');
        render(); 
    }

    function openForm(id = null) {
        document.getElementById('btn-del').style.display = id ? 'block' : 'none';
        if(id) {
            const r = records.find(x => x.id === id);
            document.getElementById('f-id').value = r.id;
            document.getElementById('f-fecha').value = r.fecha;
            document.getElementById('f-servicio').value = r.servicio;
            document.getElementById('f-monto').value = r.monto;
            document.getElementById('f-patente').value = r.patente;
            document.getElementById('f-motivo').value = r.motivo;
            document.getElementById('f-estado').value = r.estado;
        } else {
            document.getElementById('f-id').value = '';
            document.getElementById('f-fecha').value = new Date().toISOString().substring(0,10);
            document.getElementById('f-servicio').value = '';
            document.getElementById('f-monto').value = '';
            document.getElementById('f-patente').value = '';
            document.getElementById('f-motivo').value = '';
            document.getElementById('f-estado').value = 'Pendiente';
        }
        document.getElementById('modal-form').classList.add('active');
    }

    function closeForm() { document.getElementById('modal-form').classList.remove('active'); }

    async function saveRecord() {
        const id = document.getElementById('f-id').value;
        const data = {
            id: id || Math.random().toString(36).substr(2, 9),
            fecha: document.getElementById('f-fecha').value,
            servicio: document.getElementById('f-servicio').value || '0',
            monto: document.getElementById('f-monto').value || 0,
            patente: document.getElementById('f-patente').value.toUpperCase(),
            motivo: document.getElementById('f-motivo').value,
            estado: document.getElementById('f-estado').value
        };
        if(id) records = records.map(r => r.id === id ? data : r);
        else records.push(data);
        closeForm(); render(); saveToDrive();
    }

    async function deleteRecord() {
        if(!confirm('¿Borrar registro permanentemente?')) return;
        const id = document.getElementById('f-id').value;
        records = records.filter(r => r.id !== id);
        closeForm(); render(); saveToDrive();
    }
</script>
</body>
</html>
