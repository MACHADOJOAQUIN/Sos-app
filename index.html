 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOS App Pro - Drive</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0c0c0c;
            --surface-color: #161616;
            --input-bg: #1f1f1f;
            --border-color: #2a2a2a;
            --primary-red: #e11d48;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --state-pend: #f43f5e;
            --state-prog: #3b82f6;
            --state-done: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; display: flex; justify-content: center; height: 100vh; overflow: hidden; color: var(--text-main); }
        
        #app-container { width: 100%; max-width: 480px; height: 100%; background-color: var(--bg-color); display: flex; flex-direction: column; position: relative; }

        /* Header y Auth */
        header { padding: 20px 16px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .logo { color: var(--primary-red); font-size: 28px; font-weight: 900; letter-spacing: 1px; }
        
        #auth-btn { background: var(--input-bg); border: 1px solid var(--border-color); color: white; padding: 8px 14px; border-radius: 20px; font-size: 11px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        #auth-btn.logged-in { border-color: var(--state-done); color: var(--state-done); }

        /* Selector de Mes e Historial */
        .month-selector { display: flex; align-items: center; background: var(--input-bg); border-radius: 25px; padding: 4px 10px; gap: 8px; margin: 10px 16px; border: 1px solid var(--border-color); justify-content: space-between; }
        .month-selector button { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 8px; font-size: 14px; }
        .month-selector span { font-size: 14px; font-weight: bold; text-transform: capitalize; min-width: 100px; text-align: center; }
        .btn-all-history.active { color: var(--primary-red) !important; }

        /* Filtros y Lista */
        .scroll-bar { display: flex; overflow-x: auto; padding: 5px 16px 15px; gap: 10px; scrollbar-width: none; }
        .chip { padding: 8px 16px; border-radius: 15px; font-size: 12px; font-weight: bold; cursor: pointer; border: 1px solid var(--border-color); color: var(--text-muted); background: var(--surface-color); white-space: nowrap; }
        .chip.active { background: var(--primary-red); color: white; border-color: var(--primary-red); }
        .chip-sort.active { background: white; color: black; }

        main { flex: 1; overflow-y: auto; padding: 0 16px 100px; }
        .card { background: var(--surface-color); border-radius: 18px; display: flex; margin-bottom: 12px; overflow: hidden; border: 1px solid var(--border-color); }
        .card-border { width: 5px; }
        .card-content { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .card-id { color: var(--primary-red); font-size: 16px; font-weight: 900; }
        .card-price { font-size: 20px; font-weight: 900; }
        .card-info { display: flex; gap: 12px; color: var(--text-muted); font-size: 12px; font-weight: 500; }
        
        /* Footer y Totales */
        footer { position: absolute; bottom: 0; width: 100%; background: rgba(22, 22, 22, 0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--border-color); padding: 15px 25px 30px; display: flex; justify-content: space-between; align-items: center; }
        .total-amount { font-size: 28px; font-weight: 900; letter-spacing: -1px; }
        .fab { background: var(--primary-red); width: 65px; height: 55px; border-radius: 18px; border: none; color: white; font-size: 24px; cursor: pointer; box-shadow: 0 8px 20px rgba(225, 29, 72, 0.3); display: flex; align-items: center; justify-content: center; }

        /* Modales */
        .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; display: flex; justify-content: center; align-items: flex-end; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .bottom-sheet { background: var(--bg-color); width: 100%; height: 90%; border-radius: 25px 25px 0 0; transform: translateY(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px; overflow-y: auto; }
        .modal-overlay.active .bottom-sheet { transform: translateY(0); }
        
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; color: var(--text-muted); font-size: 11px; font-weight: bold; margin-bottom: 8px; letter-spacing: 1px; }
        .input-group input, .input-group select { width: 100%; background: var(--input-bg); border: 1px solid var(--border-color); color: white; padding: 15px; border-radius: 12px; outline: none; font-size: 16px; }

        #loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
    <body>
<div id="loading-overlay">
    <i class="fa-solid fa-circle-notch fa-spin fa-3x" style="color:var(--primary-red); margin-bottom:20px;"></i>
    <p style="font-weight:bold; letter-spacing:1px;">SINCRONIZANDO DRIVE...</p>
</div>

<div id="app-container">
    <header>
        <div class="logo">SOS</div>
        <button id="auth-btn" onclick="handleAuthClick()">
            <i class="fa-brands fa-google"></i> <span id="auth-text">CONECTAR DRIVE</span>
        </button>
    </header>

    <div class="month-selector">
        <button onclick="changeMonth(-1)" class="month-nav"><i class="fa-solid fa-chevron-left"></i></button>
        <span id="current-month-display">Cargando...</span>
        <button onclick="changeMonth(1)" class="month-nav"><i class="fa-solid fa-chevron-right"></i></button>
        <button onclick="toggleAllMonths()" id="btn-all" class="btn-all-history"><i class="fa-solid fa-list-check"></i></button>
    </div>

    <div class="scroll-bar">
        <div class="chip chip-sort active" id="sort-date" onclick="setSort('FECHA')">FECHA ↓</div>
        <div class="chip chip-sort" id="sort-amount" onclick="setSort('MONTO')">MONTO</div>
    </div>

    <div class="scroll-bar">
        <div class="chip chip-filter active" id="f-all" onclick="setFilter('Todos')">Todos</div>
        <div class="chip chip-filter" id="f-pend" onclick="setFilter('Pendiente')">Pendientes</div>
        <div class="chip chip-filter" id="f-done" onclick="setFilter('Terminado')">Terminados</div>
    </div>

    <main id="list-container"></main>

    <footer>
        <div>
            <span id="total-label" style="color:var(--text-muted); font-size:10px; font-weight:bold; display:block; margin-bottom:4px;">TOTAL MES</span>
            <div class="total-amount" id="total-monto">$0,00</div>
        </div>
        <button class="fab" onclick="openForm()"><i class="fa-solid fa-plus"></i></button>
    </footer>

    <div class="modal-overlay" id="modal-form">
        <div class="bottom-sheet">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                <button onclick="closeForm()" style="background:var(--input-bg); border:none; color:white; padding:10px; border-radius:12px;"><i class="fa-solid fa-xmark"></i></button>
                <h2 style="font-size:18px;">Nuevo Registro</h2>
                <div style="width:40px;"></div>
            </div>
            
            <input type="hidden" id="f-id">
            <div class="input-group"><label>FECHA DEL SERVICIO</label><input type="date" id="f-fecha"></div>
            <div style="display:flex; gap:15px;">
                <div class="input-group" style="flex:1;"><label>SERVICIO #</label><input type="number" id="f-servicio" placeholder="0000"></div>
                <div class="input-group" style="flex:1;"><label>MONTO ($)</label><input type="number" step="0.01" id="f-monto" placeholder="0.00"></div>
            </div>
            <div class="input-group"><label>PATENTE / VEHÍCULO</label><input type="text" id="f-patente" placeholder="ABC-123"></div>
            <div class="input-group"><label>DETALLE / MOTIVO</label><input type="text" id="f-motivo" placeholder="Ej: Cambio de aceite"></div>
            <div class="input-group">
                <label>ESTADO ACTUAL</label>
                <select id="f-estado">
                    <option value="Pendiente">Pendiente</option>
                    <option value="En Curso">En Curso</option>
                    <option value="Terminado">Terminado</option>
                </select>
            </div>
            <button class="fab" style="width:100%; margin-top:10px; font-size:16px; font-weight:bold;" onclick="saveRecord()">✓ GUARDAR REGISTRO</button>
            <button id="btn-del" style="width:100%; margin-top:15px; background:none; border:none; color:var(--state-pend); font-weight:bold; display:none;" onclick="deleteRecord()">BORRAR REGISTRO</button>
        </div>
    </div>
</div>

        <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

<script>
    // --- CONFIGURACIÓN ---
    const API_KEY = 'AIzaSyCg2T_OVIV0C6Lmx-JCmV67nLiQDAwqbss';
    const CLIENT_ID = 'TU_CLIENT_ID_AQUI.apps.googleusercontent.com'; // <--- PEGA TU CLIENT ID ACÁ
    const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
    const SCOPES = 'https://www.googleapis.com/auth/drive.file';

    let tokenClient, gapiInited = false, gisInited = false, driveFileId = null;
    let records = [], currentFilter = 'Todos', sortBy = 'FECHA', sortAsc = false, showAll = false;
    let currentMonth = new Date().toISOString().substring(0, 7);

    // --- INICIO DE GOOGLE ---
    function gapiLoaded() { gapi.load('client', async () => { await gapi.client.init({apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC]}); gapiInited = true; checkAuth(); }); }
    function gisLoaded() { tokenClient = google.accounts.oauth2.initTokenClient({client_id: CLIENT_ID, scope: SCOPES, callback: ''}); gisInited = true; }

    async function checkAuth() {
        const t = localStorage.getItem('g_token');
        if(t) { gapi.client.setToken({access_token: t}); updateUIAuth(true); sync(); } else { render(); }
    }

    function handleAuthClick() {
        tokenClient.callback = async (r) => { 
            if(r.error) return;
            localStorage.setItem('g_token', r.access_token); 
            updateUIAuth(true); 
            sync(); 
        };
        tokenClient.requestAccessToken({prompt: gapi.client.getToken() ? '' : 'consent'});
    }

    function updateUIAuth(s) { 
        const btn = document.getElementById('auth-btn');
        if(s) { btn.classList.add('logged-in'); document.getElementById('auth-text').innerText = 'EN LA NUBE'; } 
    }

    // --- BASE DE DATOS DRIVE ---
    async function sync() {
        document.getElementById('loading-overlay').style.display = 'flex';
        try {
            const res = await gapi.client.drive.files.list({ q: "name = 'sos_database.json' and trashed = false" });
            const files = res.result.files;
            if(files.length > 0) {
                driveFileId = files[0].id;
                const content = await gapi.client.drive.files.get({ fileId: driveFileId, alt: 'media' });
                records = content.result || [];
            } else {
                const meta = { name: 'sos_database.json', mimeType: 'application/json' };
                const file = await gapi.client.drive.files.create({ resource: meta, fields: 'id' });
                driveFileId = file.result.id;
            }
            render();
        } catch(e) { console.error(e); }
        document.getElementById('loading-overlay').style.display = 'none';
    }

    async function saveToDrive() {
        if(!driveFileId || !gapi.client.getToken()) return;
        await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
            method: 'PATCH', 
            headers: { 'Authorization': `Bearer ${gapi.client.getToken().access_token}` }, 
            body: JSON.stringify(records)
        });
    }

    // --- LÓGICA DE LA APP ---
    function render() {
        const display = document.getElementById('current-month-display');
        const navs = document.querySelectorAll('.month-nav');
        const label = document.getElementById('total-label');
        const btnAll = document.getElementById('btn-all');
        
        if(showAll) { 
            display.innerText = "Historial Completo"; 
            navs.forEach(n => n.style.display='none'); 
            label.innerText = "TOTAL ACUMULADO";
            btnAll.classList.add('active');
        } else { 
            display.innerText = currentMonth; 
            navs.forEach(n => n.style.display='block'); 
            label.innerText = "TOTAL DEL MES";
            btnAll.classList.remove('active');
        }

        let filtered = showAll ? records : records.filter(r => r.fecha.startsWith(currentMonth));
        if(currentFilter !== 'Todos') filtered = filtered.filter(r => r.estado === currentFilter);

        filtered.sort((a,b) => {
            let res = sortBy === 'FECHA' ? a.fecha.localeCompare(b.fecha) : parseFloat(a.monto) - parseFloat(b.monto);
            return sortAsc ? res : -res;
        });

        const container = document.getElementById('list-container');
        container.innerHTML = filtered.length ? '' : '<div style="text-align:center; margin-top:50px; color:gray;"><i class="fa-solid fa-folder-open fa-3x"></i><p style="margin-top:10px;">No hay registros</p></div>';
        
        filtered.forEach(r => {
            const color = r.estado === 'Terminado' ? 'var(--state-done)' : (r.estado === 'En Curso' ? 'var(--state-prog)' : 'var(--state-pend)');
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div class="card-border" style="background:${color}"></div>
                <div class="card-content" onclick="openForm('${r.id}')">
                    <div class="card-header"><span class="card-id">#${r.servicio}</span><span class="card-price">$${parseFloat(r.monto).toLocaleString()}</span></div>
                    <div class="card-info"><i class="fa-solid fa-calendar-day"></i> ${r.fecha.split('-').reverse().join('/')} <i class="fa-solid fa-car"></i> ${r.patente}</div>
                    <div style="font-size:12px; color:var(--text-muted); font-style:italic;">${r.motivo || ''}</div>
                </div>
            `;
            container.appendChild(div);
        });

        const total = filtered.reduce((s, r) => s + parseFloat(r.monto || 0), 0);
        document.getElementById('total-monto').innerText = '$' + total.toLocaleString('es-AR', {minimumFractionDigits: 2});
    }

    function toggleAllMonths() { showAll = !showAll; render(); }
    function changeMonth(d) {
        let [y, m] = currentMonth.split('-').map(Number);
        m += d; if(m>12){m=1;y++} else if(m<1){m=12;y--}
        currentMonth = `${y}-${String(m).padStart(2,'0')}`; render();
    }
    function setFilter(f) { 
        currentFilter = f; 
        document.querySelectorAll('.chip-filter').forEach(c => c.classList.remove('active'));
        if(f==='Todos') document.getElementById('f-all').classList.add('active');
        if(f==='Pendiente') document.getElementById('f-pend').classList.add('active');
        if(f==='Terminado') document.getElementById('f-done').classList.add('active');
        render(); 
    }
    function setSort(s) { 
        if(sortBy === s) sortAsc = !sortAsc; else { sortBy = s; sortAsc = false; } 
        document.querySelectorAll('.chip-sort').forEach(c => c.classList.remove('active'));
        const btn = s === 'FECHA' ? document.getElementById('sort-date') : document.getElementById('sort-amount');
        btn.classList.add('active');
        btn.innerText = s + (sortAsc ? ' ↑' : ' ↓');
        render(); 
    }

    function openForm(id = null) {
        document.getElementById('btn-del').style.display = id ? 'block' : 'none';
        if(id) {
            const r = records.find(x => x.id === id);
            document.getElementById('f-id').value = r.id;
            document.getElementById('f-fecha').value = r.fecha;
            document.getElementById('f-servicio').value = r.servicio;
            document.getElementById('f-monto').value = r.monto;
            document.getElementById('f-patente').value = r.patente;
            document.getElementById('f-motivo').value = r.motivo;
            document.getElementById('f-estado').value = r.estado;
        } else {
            document.getElementById('f-id').value = '';
            document.getElementById('f-fecha').value = new Date().toISOString().substring(0,10);
            document.getElementById('f-servicio').value = '';
            document.getElementById('f-monto').value = '';
            document.getElementById('f-patente').value = '';
            document.getElementById('f-motivo').value = '';
            document.getElementById('f-estado').value = 'Pendiente';
        }
        document.getElementById('modal-form').classList.add('active');
    }

    function closeForm() { document.getElementById('modal-form').classList.remove('active'); }

    async function saveRecord() {
        const id = document.getElementById('f-id').value;
        const data = {
            id: id || Math.random().toString(36).substr(2, 9),
            fecha: document.getElementById('f-fecha').value,
            servicio: document.getElementById('f-servicio').value || '0',
            monto: document.getElementById('f-monto').value || 0,
            patente: document.getElementById('f-patente').value.toUpperCase(),
            motivo: document.getElementById('f-motivo').value,
            estado: document.getElementById('f-estado').value
        };
        if(id) records = records.map(r => r.id === id ? data : r);
        else records.push(data);
        closeForm(); render(); saveToDrive();
    }

    async function deleteRecord() {
        if(!confirm('¿Seguro querés borrar esto?')) return;
        const id = document.getElementById('f-id').value;
        records = records.filter(r => r.id !== id);
        closeForm(); render(); saveToDrive();
    }
</script>
</body>
</html>
,
