<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOS App Pro - Red SOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
</head>
<body>

<div id="loading-overlay">
    <div class="loader"></div>
    <p>SINCRO DRIVE...</p>
</div>

<div id="app-container">
    <header>
        <div class="logo">RED<span>SOS</span></div>
        <button id="auth-btn" onclick="handleAuthClick()">
            <i class="fa-brands fa-google"></i> <span id="auth-text">CARGANDO...</span>
        </button>
    </header>

    <div class="search-container">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="main-search" placeholder="Buscar patente, vehículo o N°..." oninput="render()">
        </div>
    </div>

    <div class="actions-row">
        <button class="btn-action" onclick="exportToCSV()"><i class="fa-solid fa-file-csv"></i> Excel</button>
        <button class="btn-action" onclick="exportBackup()"><i class="fa-solid fa-download"></i> Backup</button>
        <button class="btn-action" onclick="document.getElementById('file-import').click()"><i class="fa-solid fa-upload"></i> Importar</button>
        <input type="file" id="file-import" style="display:none" accept=".json" onchange="importBackup(event)">
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <span class="stat-label">PENDIENTE</span>
            <span class="stat-value red" id="stat-pendiente">$0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">COBRADO</span>
            <span class="stat-value green" id="stat-cobrado">$0</span>
        </div>
    </div>

    <div class="time-bar">
        <button id="btn-toggle-all" onclick="toggleAllMonths()">
            <i class="fa-solid fa-list-ul"></i>
        </button>
        <div class="month-nav">
            <button onclick="changeMonth(-1)"><i class="fa-solid fa-chevron-left"></i></button>
            <span id="current-month-display">---</span>
            <button onclick="changeMonth(1)"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
    </div>

    <div class="scroll-bar">
        <div class="chip chip-sort active" id="sort-FECHA" onclick="setSort('FECHA')">FECHA ↓</div>
        <div class="chip chip-sort" id="sort-MONTO" onclick="setSort('MONTO')">MONTO</div>
        <div class="chip chip-sort" id="sort-SERVICIO" onclick="setSort('SERVICIO')">N°</div>
    </div>

    <div class="scroll-bar">
        <div class="chip chip-filter active" id="f-Todos" onclick="setFilter('Todos')">Todos <span class="badge" id="c-Todos">0</span></div>
        <div class="chip chip-filter" id="f-Pendiente" onclick="setFilter('Pendiente')">Pend. <span class="badge" id="c-Pendiente">0</span></div>
        <div class="chip chip-filter" id="f-Terminado" onclick="setFilter('Terminado')">Term. <span class="badge" id="c-Terminado">0</span></div>
    </div>

    <main id="list-container"></main>

    <footer>
        <div class="total-box">
            <span id="total-label">FACTURACIÓN MES</span>
            <div class="total-amount" id="total-monto">$0,00</div>
        </div>
        <button class="fab" onclick="openForm()">
            <i class="fa-solid fa-plus"></i>
        </button>
    </footer>

    <div class="modal-overlay" id="modal-form">
        <div class="bottom-sheet">
            <div class="sheet-header">
                <button class="btn-close" onclick="closeForm()"><i class="fa-solid fa-xmark"></i></button>
                <div class="sheet-title">PARTE DE SERVICIO</div>
            </div>
            <div class="sheet-body">
                <input type="hidden" id="f-id">
                <div class="input-group"><label>FECHA</label><input type="date" id="f-fecha"></div>
                
                <div class="row-inputs">
                    <div class="input-group"><label>SERVICIO #</label><input type="number" id="f-servicio"></div>
                    <div class="input-group"><label>MONTO ($)</label><input type="number" step="0.01" id="f-monto"></div>
                </div>

                <div class="row-inputs">
                    <div class="input-group"><label>PATENTE</label><input type="text" id="f-patente"></div>
                    <div class="input-group"><label>KM RECORRIDOS</label><input type="number" id="f-km" placeholder="0"></div>
                </div>

                <div class="input-group"><label>VEHÍCULO (MARCA / MODELO)</label><input type="text" id="f-vehiculo" placeholder="Ej: Chevrolet Zafira"></div>
                <div class="input-group"><label>MOTIVO / DETALLE</label><input type="text" id="f-motivo"></div>

                <div class="input-group">
                    <label>ESTADO DEL AUXILIO</label>
                    <select id="f-estado">
                        <option value="Pendiente">PENDIENTE</option>
                        <option value="En Curso">EN CURSO</option>
                        <option value="Terminado">TERMINADO</option>
                    </select>
                </div>
                <div class="toggle-row">
                    <span>Conciliado con Central</span>
                    <button type="button" id="f-conciliado" class="toggle-btn no" onclick="toggleBtn(this)">NO</button>
                </div>
                <div class="toggle-row">
                    <span>Cobrado</span>
                    <button type="button" id="f-cobrado" class="toggle-btn no" onclick="toggleBtn(this)">NO</button>
                </div>
                <button class="btn-save" onclick="saveRecord()">✓ GUARDAR CAMBIOS</button>
                <button id="btn-del" class="btn-del-danger" onclick="openConfirm()">ELIMINAR REGISTRO</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-confirm">
        <div class="confirm-box">
            <h3>¿ELIMINAR REGISTRO?</h3>
            <p>Se borrará permanentemente de la base de datos de Red SOS.</p>
            <div class="confirm-actions">
                <button class="btn-cancel" onclick="closeConfirm()">CANCELAR</button>
                <button class="btn-confirm-del" onclick="confirmDelete()">ELIMINAR</button>
            </div>
        </div>
    </div>
</div>

<style>
    :root {
        --bg: #000; --card: #111; --input: #1a1a1a; --border: #262626;
        --red: #e11d48; --blue: #3b82f6; --green: #10b981; --text: #fff; --gray: #71717a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; -webkit-tap-highlight-color: transparent; }

    body { background: #000; color: #fff; height: 100dvh; overflow: hidden; display: flex; justify-content: center; }
    #app-container { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; position: relative; }

    header { padding: 30px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
    .logo { color: #fff; font-size: 28px; font-weight: 900; letter-spacing: -1px; }
    .logo span { color: var(--red); }

    #auth-btn { background: var(--input); border: 1px solid var(--border); color: #fff; padding: 10px 15px; border-radius: 12px; font-size: 10px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
    #auth-btn.logged-in { border-color: var(--green); color: var(--green); }

    .search-container { padding: 10px 20px; }
    .search-box { background: var(--input); border: 1px solid var(--border); border-radius: 15px; padding: 12px 15px; display: flex; align-items: center; gap: 10px; }
    .search-box i { color: var(--gray); font-size: 14px; }
    .search-box input { background: transparent; border: none; color: #fff; outline: none; width: 100%; font-size: 14px; }

    /* ESTILOS IMPORTAR / EXPORTAR */
    .actions-row { display: flex; gap: 8px; padding: 0 20px 10px; }
    .btn-action { flex: 1; background: var(--input); border: 1px solid var(--border); color: var(--gray); padding: 10px; border-radius: 12px; font-size: 11px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; transition: 0.2s; }
    .btn-action:hover { background: #222; color: #fff; border-color: #444; }
    .btn-action i { font-size: 14px; }

    .stats-row { display: flex; gap: 10px; padding: 5px 20px 10px; }
    .stat-card { flex: 1; background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 20px; text-align: center; }
    .stat-label { display: block; color: var(--gray); font-size: 9px; font-weight: 900; margin-bottom: 5px; letter-spacing: 1px; }
    .stat-value { font-size: 18px; font-weight: 900; }
    .stat-value.red { color: var(--red); }
    .stat-value.green { color: var(--green); }

    .time-bar { padding: 5px 20px; display: flex; gap: 10px; }
    .month-nav { flex: 1; background: var(--input); border: 1px solid var(--border); border-radius: 16px; display: flex; justify-content: space-between; align-items: center; padding: 5px; }
    .month-nav button { background: transparent; border: none; color: var(--gray); padding: 8px 15px; font-size: 18px; cursor: pointer; }
    #current-month-display { font-size: 14px; font-weight: 900; text-transform: uppercase; }
    #btn-toggle-all { background: var(--input); border: 1px solid var(--border); color: var(--gray); width: 50px; border-radius: 16px; cursor: pointer; }
    #btn-toggle-all.active { color: var(--red); border-color: var(--red); }

    .scroll-bar { display: flex; overflow-x: auto; padding: 5px 20px; gap: 8px; scrollbar-width: none; }
    .scroll-bar::-webkit-scrollbar { display: none; }
    .chip { padding: 12px 18px; border-radius: 14px; font-size: 12px; font-weight: bold; background: var(--card); border: 1px solid var(--border); color: var(--gray); white-space: nowrap; cursor: pointer; }
    .chip.active { background: var(--red); color: #fff; border-color: var(--red); }
    .chip-sort.active { background: #fff; color: #000; border-color: #fff; }
    .badge { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 6px; font-size: 10px; }

    main { flex: 1; overflow-y: auto; padding: 10px 20px 180px; }
    .card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); margin-bottom: 12px; display: flex; overflow: hidden; cursor: pointer; transition: 0.2s; }
    .card-accent { width: 6px; }
    .card-body { padding: 18px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .card-top { display: flex; justify-content: space-between; align-items: center; }
    .card-id { color: var(--red); font-size: 18px; font-weight: 900; }
    .card-price { font-size: 22px; font-weight: 900; }
    .card-mid { color: var(--gray); font-size: 12px; font-weight: 600; line-height: 1.4; }
    .card-km { color: var(--blue); font-weight: 900; margin-left: 5px; }

    footer { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); padding: 20px 25px calc(30px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
    .total-amount { font-size: 32px; font-weight: 900; letter-spacing: -1px; }
    .fab { background: var(--red); width: 65px; height: 65px; border-radius: 20px; border: none; color: #fff; font-size: 28px; box-shadow: 0 10px 25px rgba(225, 29, 72, 0.4); cursor: pointer; }

    .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; display: flex; align-items: flex-end; }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .bottom-sheet { width: 100%; height: 92%; background: #000; border-radius: 30px 30px 0 0; transform: translateY(100%); transition: 0.4s; padding: 25px; border-top: 1px solid var(--border); overflow-y: auto; }
    .modal-overlay.active .bottom-sheet { transform: translateY(0); }
    
    .sheet-header { display: flex; align-items: center; margin-bottom: 25px; }
    .btn-close { background: var(--input); border: none; color: #fff; width: 45px; height: 45px; border-radius: 14px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 18px; }
    .sheet-title { flex: 1; text-align: center; font-weight: 900; font-size: 18px; color: var(--red); margin-right: 45px; }

    .row-inputs { display: flex; gap: 10px; }
    .input-group { flex: 1; }
    .input-group label { display: block; color: var(--gray); font-size: 10px; font-weight: 900; margin-bottom: 5px; text-transform: uppercase; }
    .input-group input, .input-group select { width: 100%; background: var(--input); border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 12px; outline: none; font-size: 16px; margin-bottom: 15px; font-weight: 700; }

    .toggle-row { display: flex; justify-content: space-between; align-items: center; background: var(--input); padding: 14px 20px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); }
    .toggle-row span { font-weight: 700; font-size: 14px; }
    .toggle-btn { padding: 8px 15px; border-radius: 8px; border: none; font-weight: 900; cursor: pointer; transition: 0.3s; }
    .toggle-btn.no { background: var(--red); color: #fff; }
    .toggle-btn.si { background: var(--green); color: #fff; }

    .btn-save { width: 100%; background: var(--red); color: #fff; border: none; padding: 20px; border-radius: 15px; font-size: 16px; font-weight: 900; margin-top: 10px; cursor: pointer; }
    .btn-del-danger { width: 100%; background: transparent; color: var(--red); border: 1px solid var(--red); padding: 15px; border-radius: 15px; margin-top: 15px; font-weight: bold; cursor: pointer; text-align: center; }

    #modal-confirm { align-items: center; justify-content: center; }
    .confirm-box { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 30px; width: 85%; max-width: 350px; text-align: center; transform: scale(0.9); opacity: 0; transition: 0.3s; }
    #modal-confirm.active .confirm-box { transform: scale(1); opacity: 1; }
    .confirm-box h3 { color: var(--red); font-size: 20px; font-weight: 900; margin-bottom: 10px; }
    .confirm-box p { color: var(--gray); font-size: 13px; margin-bottom: 25px; line-height: 1.5; }
    .confirm-actions { display: flex; gap: 15px; }
    .confirm-actions button { flex: 1; padding: 16px; border-radius: 14px; font-weight: 900; font-size: 14px; border: none; cursor: pointer; }
    .btn-cancel { background: var(--input); color: #fff; border: 1px solid var(--border); }
    .btn-confirm-del { background: var(--red); color: #fff; }

    #loading-overlay { position: fixed; inset: 0; background: #000; display: none; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
    .loader { border: 4px solid #111; border-top: 4px solid var(--red); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
</style>
<script>
    const API_KEY = 'AIzaSyCg2T_OVIV0C6Lmx-JCmV67nLiQDAwqbss';
    const CLIENT_ID = '474241917322-l7ub2cma675eat9g7ht2q8po09a15qhl.apps.googleusercontent.com';
    const DB_NAME = 'sos_database_vFINAL_CORREGIDA.json';

    let tokenClient, gapiInited = false, gisInited = false, driveFileId = null;
    let records = [], currentFilter = 'Todos', sortBy = 'FECHA', sortAsc = false, showAll = false;
    let currentMonth = new Date().toISOString().substring(0, 7);

    window.onload = function() {
        gapi.load('client', async () => {
            await gapi.client.init({apiKey: API_KEY, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']});
            gapiInited = true; checkReady();
        });
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: 'https://www.googleapis.com/auth/drive.file', callback: ''
        });
        gisInited = true; checkReady();
    };

    function checkReady() { if(gapiInited && gisInited) { updateAuthUI(false); checkAuth(); } }

    async function checkAuth() {
        const token = localStorage.getItem('g_token');
        if(token) { gapi.client.setToken({access_token: token}); updateAuthUI(true); syncData(); } 
        else { render(); }
    }

    function updateAuthUI(logged) { 
        const btn = document.getElementById('auth-btn');
        const textSpan = document.getElementById('auth-text');
        if(logged) { btn.classList.add('logged-in'); textSpan.innerText = 'CERRAR SESIÓN'; } 
        else { btn.classList.remove('logged-in'); textSpan.innerText = 'INICIAR SESIÓN'; }
    }

    function handleAuthClick() {
        const token = localStorage.getItem('g_token');
        if (token) {
            localStorage.removeItem('g_token');
            gapi.client.setToken(null);
            records = []; driveFileId = null;
            updateAuthUI(false); render();
        } else {
            tokenClient.callback = async (r) => { 
                if(r.error) return; 
                localStorage.setItem('g_token', r.access_token); 
                updateAuthUI(true); syncData(); 
            };
            tokenClient.requestAccessToken({prompt: gapi.client.getToken() ? '' : 'consent'});
        }
    }

    async function syncData() {
        document.getElementById('loading-overlay').style.display = 'flex';
        try {
            const res = await gapi.client.drive.files.list({ q: `name = '${DB_NAME}' and trashed = false` });
            const files = res.result.files;
            if(files.length > 0) {
                driveFileId = files[0].id;
                const content = await gapi.client.drive.files.get({ fileId: driveFileId, alt: 'media' });
                records = Array.isArray(content.result) ? content.result : [];
            } else {
                const meta = { name: DB_NAME, mimeType: 'application/json' };
                const file = await gapi.client.drive.files.create({ resource: meta, fields: 'id' });
                driveFileId = file.result.id;
                records = [];
            }
            render();
        } catch(e) {}
        document.getElementById('loading-overlay').style.display = 'none';
    }

    async function saveToDrive() {
        if(!driveFileId || !gapi.client.getToken()) return;
        try {
            await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
                method: 'PATCH', 
                headers: { 'Authorization': `Bearer ${gapi.client.getToken().access_token}` }, 
                body: JSON.stringify(records)
            });
        } catch(e) {}
    }

    function toggleBtn(btn) {
        const isSi = btn.innerText === 'SI';
        btn.innerText = isSi ? 'NO' : 'SI';
        btn.className = 'toggle-btn ' + (isSi ? 'no' : 'si');
    }

    function render() {
        const searchVal = document.getElementById('main-search').value.toLowerCase();
        let data = showAll ? records : records.filter(r => r.fecha.startsWith(currentMonth));

        if(searchVal) {
            data = data.filter(r => 
                (r.patente && r.patente.toLowerCase().includes(searchVal)) || 
                (r.vehiculo && r.vehiculo.toLowerCase().includes(searchVal)) ||
                (r.servicio && r.servicio.toString().includes(searchVal))
            );
        }

        const penMonto = data.filter(x => x.cobrado === 'NO').reduce((s,r) => s + parseFloat(r.monto || 0), 0);
        const cobMonto = data.filter(x => x.cobrado === 'SI').reduce((s,r) => s + parseFloat(r.monto || 0), 0);
        document.getElementById('stat-pendiente').innerText = '$' + penMonto.toLocaleString('es-AR');
        document.getElementById('stat-cobrado').innerText = '$' + cobMonto.toLocaleString('es-AR');

        document.getElementById('current-month-display').innerText = showAll ? "Historial" : currentMonth;
        document.getElementById('c-Todos').innerText = data.length;
        document.getElementById('c-Pendiente').innerText = data.filter(x => x.estado === 'Pendiente').length;
        document.getElementById('c-Terminado').innerText = data.filter(x => x.estado === 'Terminado').length;

        if(currentFilter !== 'Todos') data = data.filter(r => r.estado === currentFilter);

        data.sort((a,b) => {
            let res = sortBy === 'FECHA' ? a.fecha.localeCompare(b.fecha) : (sortBy === 'MONTO' ? parseFloat(a.monto) - parseFloat(b.monto) : parseInt(a.servicio) - parseInt(b.servicio));
            return sortAsc ? res : -res;
        });

        const container = document.getElementById('list-container');
        container.innerHTML = data.length ? '' : '<p style="text-align:center; margin-top:50px; opacity:0.1; font-weight:900; font-size:30px;">SIN DATOS</p>';

        data.forEach(r => {
            const color = r.estado === 'Terminado' ? 'var(--green)' : (r.estado === 'En Curso' ? 'var(--blue)' : 'var(--red)');
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<div class="card-accent" style="background:${color}"></div>
                <div class="card-body" onclick="openForm('${r.id}')">
                    <div class="card-top"><span class="card-id">#${r.servicio}</span><span class="card-price">$${parseFloat(r.monto).toLocaleString('es-AR')}</span></div>
                    <div class="card-mid">
                        <i class="fa-solid fa-car"></i> <b>${r.patente || 'S/P'}</b> | ${r.vehiculo || 'Vehículo s/d'}<br>
                        <i class="fa-solid fa-calendar"></i> ${r.fecha.split('-').reverse().join('/')} 
                        <span class="card-km"> <i class="fa-solid fa-route"></i> ${r.km || 0} km</span>
                    </div>
                </div>`;
            container.appendChild(div);
        });
        const total = data.reduce((s, r) => s + parseFloat(r.monto || 0), 0);
        document.getElementById('total-monto').innerText = '$' + total.toLocaleString('es-AR', {minimumFractionDigits: 2});
    }

    function toggleAllMonths() { showAll = !showAll; render(); }
    function changeMonth(d) {
        let [y, m] = currentMonth.split('-').map(Number);
        m += d; if(m>12){m=1;y++} else if(m<1){m=12;y--}
        currentMonth = `${y}-${String(m).padStart(2,'0')}`; showAll = false; render();
    }
    function setFilter(f) { 
        currentFilter = f; 
        document.querySelectorAll('.chip-filter').forEach(c => c.classList.remove('active')); 
        document.getElementById(`f-${f}`).classList.add('active'); 
        render(); 
    }
    function setSort(s) {
        if (sortBy === s) sortAsc = !sortAsc; else { sortBy = s; sortAsc = false; }
        document.querySelectorAll('.chip-sort').forEach(chip => {
            chip.classList.remove('active');
            let t = chip.innerText.replace(' ↑', '').replace(' ↓', '');
            if (chip.id === `sort-${s}`) { chip.classList.add('active'); chip.innerText = t + (sortAsc ? ' ↑' : ' ↓'); } 
            else { chip.innerText = t; }
        });
        render();
    }
    function openForm(id = null) {
        document.getElementById('btn-del').style.display = id ? 'block' : 'none';
        const btnConc = document.getElementById('f-conciliado');
        const btnCob = document.getElementById('f-cobrado');
        if(id) {
            const r = records.find(x => x.id === id);
            document.getElementById('f-id').value = r.id; 
            document.getElementById('f-fecha').value = r.fecha; 
            document.getElementById('f-servicio').value = r.servicio; 
            document.getElementById('f-monto').value = r.monto; 
            document.getElementById('f-patente').value = r.patente; 
            document.getElementById('f-vehiculo').value = r.vehiculo || '';
            document.getElementById('f-km').value = r.km || '';
            document.getElementById('f-motivo').value = r.motivo; 
            document.getElementById('f-estado').value = r.estado;
            btnConc.innerText = r.conciliado || 'NO'; btnConc.className = 'toggle-btn ' + (r.conciliado === 'SI' ? 'si' : 'no');
            btnCob.innerText = r.cobrado || 'NO'; btnCob.className = 'toggle-btn ' + (r.cobrado === 'SI' ? 'si' : 'no');
        } else {
            document.getElementById('f-id').value = ''; 
            document.getElementById('f-fecha').value = new Date().toISOString().substring(0,10); 
            document.getElementById('f-servicio').value = ''; 
            document.getElementById('f-monto').value = ''; 
            document.getElementById('f-patente').value = ''; 
            document.getElementById('f-vehiculo').value = '';
            document.getElementById('f-km').value = '';
            document.getElementById('f-motivo').value = ''; 
            document.getElementById('f-estado').value = 'Pendiente';
            btnConc.innerText = 'NO'; btnConc.className = 'toggle-btn no';
            btnCob.innerText = 'NO'; btnCob.className = 'toggle-btn no';
        }
        document.getElementById('modal-form').classList.add('active');
    }
    function closeForm() { document.getElementById('modal-form').classList.remove('active'); }
    function openConfirm() { document.getElementById('modal-confirm').classList.add('active'); }
    function closeConfirm() { document.getElementById('modal-confirm').classList.remove('active'); }
    async function saveRecord() {
        const id = document.getElementById('f-id').value;
        const data = { 
            id: id || Math.random().toString(36).substr(2, 9), 
            fecha: document.getElementById('f-fecha').value, 
            servicio: document.getElementById('f-servicio').value || '0', 
            monto: document.getElementById('f-monto').value || 0, 
            patente: document.getElementById('f-patente').value.toUpperCase(), 
            vehiculo: document.getElementById('f-vehiculo').value,
            km: document.getElementById('f-km').value || 0,
            motivo: document.getElementById('f-motivo').value, 
            estado: document.getElementById('f-estado').value,
            conciliado: document.getElementById('f-conciliado').innerText,
            cobrado: document.getElementById('f-cobrado').innerText
        };
        if(id) records = records.map(r => r.id === id ? data : r); else records.push(data);
        closeForm(); render(); await saveToDrive();
    }
    async function confirmDelete() { 
        closeConfirm();
        records = records.filter(r => r.id !== document.getElementById('f-id').value); 
        closeForm(); render(); await saveToDrive(); 
    }

    // --- FUNCIONES DE IMPORTAR Y EXPORTAR ---
    function exportToCSV() {
        if (!records.length) return alert("No hay datos para exportar.");
        let csv = "ID,FECHA,SERVICIO,MONTO,PATENTE,VEHICULO,KM,MOTIVO,ESTADO,CONCILIADO,COBRADO\n";
        records.forEach(r => {
            let motivoLimpio = `"${(r.motivo || '').replace(/"/g, '""')}"`;
            let row = [
                r.id, r.fecha, r.servicio, r.monto, r.patente, r.vehiculo, r.km, 
                motivoLimpio, r.estado, r.conciliado, r.cobrado
            ];
            csv += row.join(",") + "\n";
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `RedSOS_Reporte_${new Date().toISOString().substring(0,10)}.csv`;
        link.click();
    }

    function exportBackup() {
        if (!records.length) return alert("No hay datos para respaldar.");
        const blob = new Blob([JSON.stringify(records)], { type: 'application/json' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `RedSOS_Backup_Completo.json`;
        link.click();
    }

    function importBackup(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const importado = JSON.parse(e.target.result);
                if (Array.isArray(importado)) {
                    if (confirm(`Se encontraron ${importado.length} registros en el archivo.\n\n[ACEPTAR] para SUMARLOS a la base actual.\n[CANCELAR] para REEMPLAZAR toda la base.`)) {
                        const idsActuales = new Set(records.map(r => r.id));
                        importado.forEach(nuevo => { if (!idsActuales.has(nuevo.id)) records.push(nuevo); });
                    } else {
                        if (confirm("¡CUIDADO! Vas a borrar los datos actuales de la nube y cambiarlos por los de este archivo. ¿Estás seguro?")) {
                            records = importado;
                        } else { event.target.value = ''; return; }
                    }
                    document.getElementById('loading-overlay').style.display = 'flex';
                    await saveToDrive();
                    render();
                    alert("¡Base de datos actualizada con éxito!");
                } else { alert("El archivo no tiene el formato correcto."); }
            } catch (error) { alert("Error al leer el archivo. Asegurate de que sea un archivo .json válido."); }
            event.target.value = '';
        };
        reader.readAsText(file);
    }
</script>
